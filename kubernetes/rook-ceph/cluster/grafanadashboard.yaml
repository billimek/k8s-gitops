---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: ceph-cluster
  namespace: rook-ceph
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  folder: storage
  # renovate: depName=2842
  url: https://grafana.com/api/dashboards/2842/revisions/18/download
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
