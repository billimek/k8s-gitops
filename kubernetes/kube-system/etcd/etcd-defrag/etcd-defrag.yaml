---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd-defrag
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      # Must use host network to access etcd on localhost:2379
      hostNetwork: true
      hostPID: true
      securityContext:
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0
      # Ensure this only runs on the control plane node
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    controllers:
      etcd-defrag:
        type: cronjob
        cronjob:
          # Run weekly on Sunday at 3 AM
          schedule: "0 3 * * 0"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/ahrtr/etcd-defrag
              tag: v0.40.0@sha256:3cc3433d51caabfff917268b3c8aa8f0274d5422127085a7d9f6cf219b6c4b55
            args:
              - --endpoints=https://127.0.0.1:2379
              - --cluster
              - --cacert=/certs/ca.crt
              - --cert=/certs/server.crt
              - --key=/certs/server.key
              # Defrag when DB quota usage > 50% OR free space > 100MB
              - --defrag-rule=dbQuotaUsage > 0.5 || dbSizeFree > 100*1024*1024
              # Move leader during defrag (safe for single-node)
              - --move-leader
              # Wait 30s between defrags (only matters if you had multiple members)
              - --wait-between-defrags=30s
              # Match the quota-backend-bytes we set in Talos config
              - --etcd-storage-quota-bytes=8589934592
              # Auto-disalarm space quota alarms
              - --auto-disalarm
              - --disalarm-threshold=0.8
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 128Mi
            securityContext:
              privileged: true
        serviceAccount:
          name: etcd-defrag

    persistence:
      certs:
        type: hostPath
        hostPath: /system/secrets/etcd
        globalMounts:
          - path: /certs
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          etcd-defrag:
            app:
              - path: /tmp
                subPath: tmp
