---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: opnsense-exporter
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: networking
  # renovate: depName=21113
  url: https://grafana.com/api/dashboards/21113/revisions/1/download
  datasources:
    # Only DS_PROMETHEUS-K0 — prefix-matching would corrupt ${DS_PROMETHEUS-K0} if DS_PROMETHEUS were also listed
    - inputName: DS_PROMETHEUS-K0
      datasourceName: Prometheus
