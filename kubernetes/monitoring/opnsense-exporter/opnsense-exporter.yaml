---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opnsense-exporter
  namespace: monitoring
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault

    controllers:
      opnsense-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/athennamind/opnsense-exporter
              tag: 0.0.14@sha256:f12d63ec39e03583d5ec93f2bcdf2e92f57cff8a41691e1fdabbd760c3faa02b
            args:
              - --log.level=info
              - --log.format=json
              - --opnsense.protocol=https
              - --opnsense.address=10.0.7.1:1443
              - --opnsense.api-key=$(OPNSENSE_API_KEY)
              - --opnsense.api-secret=$(OPNSENSE_API_SECRET)
              - --opnsense.insecure
              - --exporter.instance-label=opnsense-primary
              - --exporter.disable-wireguard
              - --exporter.disable-openvpn
              - --web.listen-address=:8080
            env:
              TZ: America/New_York
            envFrom:
              - secretRef:
                  name: opnsense-exporter-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true

    service:
      app:
        controller: opnsense-exporter
        ports:
          http:
            port: 8080
