---
# Externally-reachable LoadBalancer endpoint for syslog senders (e.g.
# OPNsense). Routes UDP/514 on the VIP to the victoria-logs-collector
# DaemonSet pods listening on UDP/5514 (configured via vlagent
# `-syslog.listenAddr.udp` extraArg in collector.yaml).
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs-syslog
  namespace: monitoring
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.6.58
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: victoria-logs-collector
    app.kubernetes.io/instance: victoria-logs-collector
  ports:
    - name: syslog-udp
      protocol: UDP
      port: 514
      targetPort: 5514
