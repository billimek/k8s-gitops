---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-charts
  namespace: monitoring
spec:
  interval: 2h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.12.4
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-single
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-charts
  interval: 1h
  install:
    createNamespace: true
  # The chart bundles two dashboards under a single `dashboards.enabled`
  # toggle; we want the victorialogs-single-node one but not the Vector
  # K8s monitoring one (no Vector instance runs in this cluster). Strip
  # the sidecar-discovery label from the unwanted ConfigMap so Grafana
  # ignores it without losing the useful dashboard.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ConfigMap
              name: victoria-logs-vector-k8s-monitoring
            patch: |
              - op: remove
                path: /metadata/labels/grafana_dashboard
  values:
    fullnameOverride: victoria-logs
    server:
      retentionPeriod: 14d
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 20Gi
      serviceMonitor:
        enabled: true
      route:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - vlogs.eviljungle.com
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: victoria-logs-server
                port: 9428
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "infrastructure"
    vector:
      enabled: false
