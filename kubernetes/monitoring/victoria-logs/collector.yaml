---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-collector-charts
  namespace: monitoring
spec:
  interval: 2h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.3
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-collector
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
  namespace: monitoring
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector-charts
  interval: 1h
  values:
    fullnameOverride: victoria-logs-collector
    remoteWrite:
      - url: http://victoria-logs-server.monitoring.svc.cluster.local:9428
    podMonitor:
      enabled: true
    extraArgs:
      syslog.listenAddr.udp: ":5514"
      syslog.streamFields.udp: '["hostname","app_name"]'
      syslog.useLocalTimestamp.udp: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 384Mi
