---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-collector-charts
  namespace: monitoring
spec:
  interval: 2h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.3
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-collector
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
  namespace: monitoring
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector-charts
  interval: 1h
  values:
    fullnameOverride: victoria-logs-collector
    remoteWrite:
      - url: http://victoria-logs-server.monitoring.svc.cluster.local:9428
    podMonitor:
      enabled: true
    extraArgs:
      # Listen for syslog from OPNsense (and other hosts). Exposed
      # cluster-externally via the `victoria-logs-syslog` Service in this
      # directory (LB IP 10.0.6.58, UDP/514 → pod UDP/5514).
      syslog.listenAddr.udp: ":5514"
      # Promote hostname and app_name to stream fields so dashboards can
      # filter via `_stream:{hostname="opnsense", app_name="filterlog"}`.
      syslog.streamFields.udp: "hostname,app_name"
      # Trust the receiver clock; OPNsense may not send precise timestamps.
      syslog.useLocalTimestamp.udp: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 384Mi
