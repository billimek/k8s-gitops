---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: smokeping
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: networking
  # renovate: depName=22471
  url: https://grafana.com/api/dashboards/22471/revisions/1/download
  datasources:
    - inputName: DATASOURCE
      datasourceName: Prometheus
    - inputName: VAR_JOB
      datasourceName: smokeping-prober
