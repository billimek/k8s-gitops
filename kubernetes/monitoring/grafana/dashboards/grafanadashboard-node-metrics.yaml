---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: node-metrics
  # renovate: depName=22413 (frozen at rev 6: rev 7+ use dashboard.grafana.app/v2 schema, which grafana-operator cannot import via spec.url)
  url: https://grafana.com/api/dashboards/22413/revisions/6/download
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
