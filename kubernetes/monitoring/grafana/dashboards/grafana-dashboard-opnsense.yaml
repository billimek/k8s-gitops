            "showUnfilled": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "_stream:{hostname=\"OPNsense.home\",app_name=\"filterlog\"} | extract \"<_>,<_>,<_>,<_>,<intf>,<_>,<action>,<_>,<ipver>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<dport>,<_>\" | filter intf:=\"igb0\" action:=\"pass\" ipver:=\"4\" | stats by (dport) count() c | sort by (c) desc | limit 10",
