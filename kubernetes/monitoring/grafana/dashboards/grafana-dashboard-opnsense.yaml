---
# NOTE: Queries OPNsense filterlog via VictoriaLogs (datasource UID
# "VictoriaLogs"). Ingestion path: OPNsense → syslog UDP → LB
# 10.0.6.58:514 → victoria-logs-collector vlagent (`-syslog.listenAddr.udp`)
# → VictoriaLogs. With `streamFields=hostname,app_name`, hostname and
# app_name become stream selectors. The CSV-formatted filterlog message
# body lands in `_msg` and is parsed at query time with LogsQL `extract`.
# OPNsense IPv4 TCP/UDP filterlog field positions used here:
#   5 interface, 7 action, 9 ipversion, 22 dport.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-opnsense
  namespace: monitoring
  labels:
    grafana_dashboard: "true"
  annotations:
    grafana_folder: "networking"
data:
  opnsense.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 66,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 11,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 4,
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "pluginVersion": "8.3.3",
          "targets": [
            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "_stream:{hostname=\"opnsense\",app_name=\"filterlog\"} | extract \"<_>,<_>,<_>,<_>,<intf>,<_>,<action>,<_>,<ipver>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<dport>,<_>\" | filter intf:=\"igb0\" action:=\"pass\" ipver:=\"4\" | stats by (dport) count() rows | sort by (rows) desc | limit 10",
              "instant": true,
              "legendFormat": "{{filter_destination_port}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Top 10 allowed incoming ports",
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  {
                    "desc": true,
                    "field": "Value #A"
                  }
                ]
              }
            },
            {
              "id": "rowsToFields",
              "options": {
                "mappings": [
                  {
                    "fieldName": "Time",
                    "handlerKey": "field.value"
                  },
                  {
                    "fieldName": "filter_source_port",
                    "handlerKey": "field.name"
                  },
                  {
                    "fieldName": "Value #A",
                    "handlerKey": "field.value"
                  },
                  {
                    "fieldName": "filter_destination_port",
                    "handlerKey": "field.name"
                  }
                ]
              }
            }
          ],
          "type": "bargauge"
        }
      ],
      "schemaVersion": 34,
      "style": "dark",
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "OPNsense",
      "uid": "itdu1LAnk",
      "version": 9,
      "weekStart": ""
    }
