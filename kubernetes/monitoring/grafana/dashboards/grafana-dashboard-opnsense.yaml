            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "_stream:{hostname=\"OPNsense.home\",app_name=\"filterlog\"} | extract \"<_>,<_>,<_>,<_>,<intf>,<_>,<action>,<_>,<ipver>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<_>,<src>,<_>\" | filter intf:=\"igb0\" action:=\"block\" ipver:=\"4\" | stats by (src) count() c | sort by (c) desc | limit 10",
