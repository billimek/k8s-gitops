---
# NOTE: This dashboard's panels query OPNsense filterlog data from
# VictoriaLogs (datasource UID "VictoriaLogs"). They will be empty until
# OPNsense syslog forwarding to VictoriaLogs is configured (e.g. via
# vector or syslog-ng) with the JSON fields hostname, appname,
# filter_action, filter_interface, filter_destination_port, and
# geoip_country_code populated. Until then, prefer the
# `opnsense-exporter` dashboard (URL-imported in grafana.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-opnsense
  namespace: monitoring
  labels:
    grafana_dashboard: "true"
  annotations:
    grafana_folder: "networking"
data:
  opnsense.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 66,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "circleMaxSize": 30,
          "circleMinSize": 2,
          "colors": [
            "rgba(245, 54, 54, 0.9)",
            "rgba(237, 129, 40, 0.89)",
            "rgba(50, 172, 45, 0.97)"
          ],
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "decimals": 0,
          "esMetric": "Count",
          "gridPos": {
            "h": 11,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "hideEmpty": false,
          "hideZero": false,
          "id": 2,
          "initialZoom": 1,
          "locationData": "countries",
          "mapCenter": "(0\u00b0, 0\u00b0)",
          "mapCenterLatitude": 0,
          "mapCenterLongitude": 0,
          "maxDataPoints": 1,
          "mouseWheelZoom": false,
          "showLegend": true,
          "stickyLabels": false,
          "tableQueryOptions": {
            "geohashField": "geohash",
            "latitudeField": "latitude",
            "longitudeField": "longitude",
            "metricField": "metric",
            "queryType": "geohash"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "P8E80F9AEF21F6940"
              },
              "expr": "_stream:{hostname=\"opnsense\"} appname:filterlog filter_action:pass | stats by (geoip_country_code) count()",
              "legendFormat": "{{geoip_country_code}}",
              "refId": "A"
            }
          ],
          "thresholds": "0,10",
          "title": "Allowed incoming connections by GeoIP",
          "type": "grafana-worldmap-panel",
          "unitPlural": "",
          "unitSingle": "",
          "valueName": "total"
        },
        {
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 11,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 4,
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "pluginVersion": "8.3.3",
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "P8E80F9AEF21F6940"
              },
              "expr": "_stream:{hostname=\"opnsense\"} appname:filterlog filter_action:pass filter_interface:igb0 -filter_destination_port:\"\" | stats by (filter_destination_port) count() | sort by (count) desc | limit 10",
              "instant": true,
              "legendFormat": "{{filter_destination_port}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Top 10 allowed incoming ports",
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  {
                    "desc": true,
                    "field": "Value #A"
                  }
                ]
              }
            },
            {
              "id": "rowsToFields",
              "options": {
                "mappings": [
                  {
                    "fieldName": "Time",
                    "handlerKey": "field.value"
                  },
                  {
                    "fieldName": "filter_source_port",
                    "handlerKey": "field.name"
                  },
                  {
                    "fieldName": "Value #A",
                    "handlerKey": "field.value"
                  },
                  {
                    "fieldName": "filter_destination_port",
                    "handlerKey": "field.name"
                  }
                ]
              }
            }
          ],
          "type": "bargauge"
        }
      ],
      "schemaVersion": 34,
      "style": "dark",
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "OPNsense",
      "uid": "itdu1LAnk",
      "version": 9,
      "weekStart": ""
    }
