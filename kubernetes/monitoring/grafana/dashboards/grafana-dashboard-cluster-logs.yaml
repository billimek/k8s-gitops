            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "* | stats by (kubernetes.namespace_name) count() c | sort by (c) desc | limit 8",
              "queryType": "stats",
              "legendFormat": "{{kubernetes.namespace_name}}",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "rowsToFields",
              "options": {
                "mappings": [
                  {"fieldName": "kubernetes.namespace_name", "handlerKey": "field.name"},
                  {"fieldName": "c", "handlerKey": "field.value"}
                ]
              }
            }
