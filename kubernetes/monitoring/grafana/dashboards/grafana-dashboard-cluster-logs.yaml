              "targets": [
                {
                  "datasource": {
                    "type": "victoriametrics-logs-datasource",
                    "uid": "VictoriaLogs"
                  },
                  "expr": "_stream:{app_name!=\"\"}",
                  "refId": "A"
                }
              ],
              "type": "logs"
            }
          ],
          "type": "row"
        }
