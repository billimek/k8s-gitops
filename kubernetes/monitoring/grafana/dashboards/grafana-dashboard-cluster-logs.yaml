            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "continuous-GrYlRd"},
                  "mappings": [],
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [{"color": "green", "value": null}]
                  }
                },
                "overrides": []
              },
              "gridPos": {"h": 6, "w": 24, "x": 0, "y": 31},
              "id": 11,
              "options": {
                "displayMode": "lcd",
                "orientation": "horizontal",
                "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                "showUnfilled": true
              },
              "title": "Top syslog sources",
              "targets": [
                {
                  "datasource": {
                    "type": "victoriametrics-logs-datasource",
                    "uid": "VictoriaLogs"
                  },
                  "expr": "_stream:{app_name!=\"\"} | stats by (hostname, app_name) count() c | sort by (c) desc | limit 10",
                  "queryType": "stats",
                  "legendFormat": "{{hostname}}/{{app_name}}",
                  "refId": "A"
                }
              ],
              "transformations": [
                {
                  "id": "rowsToFields",
                  "options": {
                    "mappings": [
                      {"fieldName": "hostname", "handlerKey": "field.name"},
                      {"fieldName": "c", "handlerKey": "field.value"}
                    ]
                  }
