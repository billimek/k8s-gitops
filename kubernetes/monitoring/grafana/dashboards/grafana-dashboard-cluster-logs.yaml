          "targets": [
            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "kubernetes.namespace_name:~\"$namespace\" | stats count() total",
              "queryType": "stats",
              "refId": "A"
            }
          ],
          "type": "stat"
        },
        {
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
