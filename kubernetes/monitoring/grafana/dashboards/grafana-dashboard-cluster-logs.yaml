          "targets": [
            {
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "kubernetes.namespace_name:~\"$namespace\" | stats by (kubernetes.namespace_name, kubernetes.pod_name) count() count | sort by (count) desc | limit 20",
              "queryType": "stats",
              "refId": "A"
            }
          ],
          "type": "table"
        },
        {
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "gridPos": {"h": 18, "w": 24, "x": 0, "y": 12},
          "id": 5,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
