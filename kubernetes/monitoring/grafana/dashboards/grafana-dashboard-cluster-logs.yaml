              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "VictoriaLogs"
              },
              "expr": "kubernetes.namespace_name:~\"$namespace\" kubernetes.pod_name:~\"$pod\" $search",
              "refId": "A"
            }
          ],
          "type": "logs"
        },
        {
          "collapsed": true,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 30},
          "id": 10,
          "title": "Syslog",
