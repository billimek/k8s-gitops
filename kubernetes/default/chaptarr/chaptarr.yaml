---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app chaptarr
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      chaptarr:
        initContainers:
          chown-run:
            image:
              repository: busybox
              tag: 1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
            command: ["sh", "-c"]
            args: ["chown -R 1001:1001 /run"]
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
        containers:
          app:
            image:
              repository: docker.io/robertlordhood/chaptarr
              tag: develop@sha256:d5cffbf7229d43a077d336574e312bd261581a95b9f268e502f16c5aafc097fc
            env:
              CHAPTARR__APP__INSTANCENAME: chaptarr
              CHAPTARR__APPLICATION_URL: 'https://chaptarr.eviljungle.com'
              CHAPTARR__APP__THEME: dark
              CHAPTARR__AUTH__METHOD: Forms
              CHAPTARR__AUTH__REQUIRED: DisabledForLocalAddresses
              CHAPTARR__LOG__DBENABLED: "False"
              CHAPTARR__LOG__LEVEL: info
              CHAPTARR__SERVER__PORT: &port 8789
              CHAPTARR__UPDATE__BRANCH: develop
              TZ: America/New_York
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 750Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: chaptarr
        ports:
          http:
            port: *port

    route:
      main:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - chaptarr.eviljungle.com
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: *app
                port: 8789

    persistence:
      config:
        existingClaim: chaptarr-config
      media:
        type: nfs
        server: nas.home
        path: /mnt/tank/media
        globalMounts:
          - path: /media
      run:
        type: emptyDir
        globalMounts:
          - path: /run
      tmp:
        type: emptyDir
