---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: teslamate
  namespace: default
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: teslamate
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
