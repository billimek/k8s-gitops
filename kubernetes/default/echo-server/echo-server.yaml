---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo-server
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault

    controllers:
      echo-server:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/echo
              tag: 0.2.1@sha256:89e18bc031f50b5fc706a4fc85007f4d44635762146d4f16f49d993fcfde2e39
            env:
              ECHO_HTTP_PORT: &port 8080
              ECHO_METRICS_PORT: &metrics-port 8081
              ECHO_METRICS_ENABLED: "true"
              ECHO_LOG_FORMAT: json
              ECHO_PRETTY_PRINT: "true"
              ECHO_KUBERNETES: "true"
              ECHO_POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              ECHO_POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              ECHO_POD_IP:
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              ECHO_NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 96Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/external: "true"
        parentRefs:
          - name: public
            namespace: kube-system
            sectionName: https
        hostnames:
          - &host www.eviljungle.com
      internal:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - *host
      bare:
        annotations:
          external-dns.alpha.kubernetes.io/external: "true"
        parentRefs:
          - name: public
            namespace: kube-system
            sectionName: https-bare
        hostnames:
          - eviljungle.com
      bare-internal:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-bare
        hostnames:
          - eviljungle.com

    service:
      app:
        controller: echo-server
        ports:
          http:
            port: *port
          metrics:
            port: *metrics-port

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
