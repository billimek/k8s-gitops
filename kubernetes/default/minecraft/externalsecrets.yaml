---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcproxy-velocity-secret
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mcproxy-velocity-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # mounted as a file at /server/forwarding.secret in the proxy container
        forwarding.secret: "{{ .velocity_forwarding_secret }}"
  dataFrom:
    - extract:
        key: minecraft
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minecraft-survival-secret
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minecraft-survival-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RCON_PASSWORD: "{{ .rcon_password }}"
        CFG_VELOCITY_SECRET: "{{ .velocity_forwarding_secret }}"
  dataFrom:
    - extract:
        key: minecraft
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minecraft-survival2-secret
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minecraft-survival2-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Used by itzg REPLACE_ENV_VARIABLES to inject BotToken into DiscordSRV config.yml
        CFG_DISCORDSRV_TOKEN: "{{ .discordsrv_token }}"
        RCON_PASSWORD: "{{ .rcon_password }}"
        CFG_VELOCITY_SECRET: "{{ .velocity_forwarding_secret }}"
  dataFrom:
    - extract:
        key: minecraft
---
