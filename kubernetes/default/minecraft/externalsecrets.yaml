  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minecraft-lobby-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RCON_PASSWORD: "{{ .rcon_password }}"
  dataFrom:
    - extract:
        key: minecraft
