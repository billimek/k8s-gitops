---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-router
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

    controllers:
      minecraft-router:
        pod:
          automountServiceAccountToken: true
        serviceAccount:
          identifier: minecraft-router
        containers:
          app:
            image:
              repository: itzg/mc-router
              tag: 1.43.1@sha256:b4f4c50ba90ab2ea93cff96b7cba1c1d7d41f3e580ce20d989e4d6744f054a53
            args:
              - --in-kube-cluster
              - --auto-scale-up
              - --auto-scale-down
              - --auto-scale-down-after=1h
              - --connection-rate-limit=5
              - --api-binding=:25566
              - --metrics-backend=prometheus
              - --record-logins
            env:
              KUBE_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /routes
                    port: 25566
                    httpHeaders:
                      - name: Accept
                        value: application/json
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /routes
                    port: 25566
                    httpHeaders:
                      - name: Accept
                        value: application/json
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    rbac:
      roles:
        minecraft-router:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["watch", "list"]
            - apiGroups: ["apps"]
              resources: ["statefulsets"]
              verbs: ["watch", "list", "patch"]
            - apiGroups: ["apps"]
              resources: ["statefulsets/scale"]
              verbs: ["get"]
      bindings:
        minecraft-router:
          type: RoleBinding
          roleRef:
            identifier: minecraft-router
          subjects:
            - identifier: minecraft-router

    service:
      app:
        controller: minecraft-router
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        loadBalancerIP: 10.0.6.106
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: mc.eviljungle.com,mc-smp.eviljungle.com,mc-smp2.eviljungle.com
          external-dns.alpha.kubernetes.io/target: "10.0.6.106"
        ports:
          minecraft:
            port: 25565
            protocol: TCP
      api:
        controller: minecraft-router
        ports:
          api:
            port: 25566
      cloudflare-dns:
        controller: minecraft-router
        type: ExternalName
        externalName: direct.eviljungle.com
        annotations:
          external-dns.alpha.kubernetes.io/external: "true"
          external-dns.alpha.kubernetes.io/hostname: mc.eviljungle.com,mc-smp.eviljungle.com,mc-smp2.eviljungle.com
          external-dns.alpha.kubernetes.io/target: direct.eviljungle.com
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        ports:
          minecraft:
            port: 25565
            protocol: TCP

    serviceAccount:
      minecraft-router: {}
