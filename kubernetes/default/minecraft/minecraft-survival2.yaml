---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-survival2
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      direct-auth-patch:
        data:
          paper-direct-auth.json: |
            {
              "file": "/data/config/paper-global.yml",
              "ops": [
                { "$set": { "path": "$.proxies['bungee-cord']['online-mode']", "value": true, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity.enabled", "value": false, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity['online-mode']", "value": true, "value-type": "bool" } }
              ]
            }
          disable-bungee-forwarding.json: |
            {
              "file": "/data/spigot.yml",
              "ops": [
                { "$set": { "path": "$.settings.bungeecord", "value": false, "value-type": "bool" } }
              ]
            }
          discordsrv-token.json: |
            {
              "file": "/data/plugins/DiscordSRV/config.yml",
              "ops": [
                { "$set": { "path": "$.BotToken", "value": "${CFG_DISCORDSRV_TOKEN}" } }
              ]
            }
          prometheus-exporter-config.json: |
            {
              "file": "/data/plugins/PrometheusExporter/config.yml",
              "ops": [
                { "$set": { "path": "$.host", "value": "0.0.0.0" } },
                { "$set": { "path": "$.port", "value": 9940, "value-type": "int" } }
              ]
            }
      prometheus-exporter-config:
        data:
          config.yml: |
            host: 0.0.0.0
            port: 9940

    controllers:
      minecraft-survival2:
        type: statefulset
        statefulset:
          serviceName: minecraft-survival2
        replicas: 0
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.6.1@sha256:2a3ed0997720d79b7ed783a79e43143358b2e60d27daf15c2b1d27b59d04a6d8
            env:
              EULA: "true"
              TYPE: PAPER
              VERSION: LATEST
              PAPER_CHANNEL: experimental
              DIFFICULTY: normal
              MODE: survival
              HARDCORE: "false"
              ONLINE_MODE: "true"
              OVERRIDE_SERVER_PROPERTIES: "true"
              MEMORY: 7168M
              USE_AIKAR_FLAGS: "true"
              JVM_OPTS: "--add-modules=jdk.incubator.vector"
              MAX_WORLD_SIZE: "5999968"
              MAX_TICK_TIME: "-1"
              PAUSE_WHEN_EMPTY_SECONDS: "300"
              SPAWN_PROTECTION: "4"
              VIEW_DISTANCE: "24"
              LEVEL: world-20250218-thunderdome
              OPS: billimek
              WHITELIST: "billimek,Nadorrior,Sandbragger,tkws88,KhrysPBacon,MackCulley,Guydon,Shivanater"
              ICON: https://www.freeiconspng.com/uploads/minecraft-server-icon-23.png
              MOTD: "§c§lEvilJungle Survival 2§r\n§7Public SMP §8| §6Thunderdome"
              STOP_SERVER_ANNOUNCE_DELAY: "20"
              PATCH_DEFINITIONS: /patch-defs
              APPLY_EXTRA_FILES: |
                plugins<https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
                plugins/PrometheusExporter</prometheus-exporter-config/config.yml
                plugins<https://cdn.modrinth.com/data/nfGCP9fk/versions/9zLThg7h/item-nbt-api-plugin-2.15.7.jar
                plugins<https://ci.prism-mc.org/job/prism/228/artifact/prism-paper-loader/build/libs/prism-paper-v4.3-dev73.jar
                plugins<https://cdn.modrinth.com/data/hXiIvTyT/versions/nY6VN1XH/EssentialsX-2.22.0.jar
              MODRINTH_PROJECTS: |
                locked-chests-plugin
                discordsrv
                bluemap
                luckperms
                nochatreports-spigot-paper
            envFrom:
              - secretRef:
                  name: minecraft-survival2-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 9Gi
                cpu: 1000m
              limits:
                memory: 9Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      data:
        existingClaim: minecraft-survival2-datadir
        globalMounts:
          - path: /data
      direct-auth-patch:
        type: configMap
        identifier: direct-auth-patch
        globalMounts:
          - path: /patch-defs
      prometheus-exporter-config:
        type: configMap
        identifier: prometheus-exporter-config
        globalMounts:
          - path: /prometheus-exporter-config/config.yml
            subPath: config.yml
            readOnly: true

    route:
      bluemap:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - mcsv2-map.eviljungle.com
        rules:
          - matches:
              - path: {type: PathPrefix, value: /}
            backendRefs:
              - name: minecraft-survival2
                port: 8100

    service:
      app:
        controller: minecraft-survival2
        labels:
          minecraft.eviljungle.com/server-metrics: "true"
        annotations:
          mc-router.itzg.me/externalServerName: mc-smp2.eviljungle.com
          mc-router.itzg.me/autoScaleAsleepMOTD: "§8[asleep] §csurvival2§r - connecting wakes it"
          mc-router.itzg.me/autoScaleLoadingMOTD: "§e[starting] §csurvival2§r - give it a minute"
          mc-router.itzg.me/autoScaleWaitTimeout: 5m
        ports:
          minecraft:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
          bluemap:
            port: 8100
          metrics:
            port: 9940
