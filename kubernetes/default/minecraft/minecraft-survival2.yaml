---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-survival2
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      velocity-patch:
        data:
          velocity-forwarding.json: |
            {
              "patches": [
                {
                  "file": "/data/config/paper-global.yml",
                  "ops": [
                    { "$set": { "path": "$.proxies.velocity.enabled", "value": true, "value-type": "bool" } },
                    { "$set": { "path": "$.proxies.velocity['online-mode']", "value": true, "value-type": "bool" } },
                    { "$set": { "path": "$.proxies.velocity.secret", "value": "${CFG_VELOCITY_SECRET}" } }
                  ]
                }
              ]
            }

    controllers:
      minecraft-survival2:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.4@sha256:f364bae78a0027aee72b01b9b532b1ae0990b3ee8cadbb6a3bc25db77418a25f
            env:
              EULA: "true"
              TYPE: PAPER
              VERSION: LATEST
              DIFFICULTY: normal
              MODE: survival
              HARDCORE: "false"
              ONLINE_MODE: "false"
              OVERRIDE_SERVER_PROPERTIES: "true"
              MEMORY: 7168M
              USE_AIKAR_FLAGS: "true"
              JVM_OPTS: "--add-modules=jdk.incubator.vector"
              MAX_WORLD_SIZE: "5999968"
              MAX_TICK_TIME: "-1"
              SPAWN_PROTECTION: "4"
              VIEW_DISTANCE: "24"
              LEVEL: world-20250218-thunderdome
              OPS: billimek
              WHITELIST: "billimek,Nadorrior,Sandbragger,tkws88,KhrysPBacon,MackCulley,Guydon,Shivanater"
              ICON: https://www.freeiconspng.com/uploads/minecraft-server-icon-23.png
              MOTD: "§6§lpublic survival§r§l - §r§c§lSMP§r\n"
              STOP_SERVER_ANNOUNCE_DELAY: "20"
              REPLACE_ENV_VARIABLES: "true"
              PATCH_DEFINITIONS: /patch-defs
              MODRINTH_PROJECTS: |
                essentialsx
                coreprotect?
                locked-chests-plugin
                freezehibernate?
                discordsrv
                distant-horizons-support
                bluemap
                luckperms
                nochatreports-spigot-paper
            envFrom:
              - secretRef:
                  name: minecraft-survival2-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 9Gi
                cpu: 1000m
              limits:
                memory: 9Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      data:
        existingClaim: minecraft-survival2-datadir
        globalMounts:
          - path: /data
      velocity-patch:
        type: configMap
        identifier: velocity-patch
        globalMounts:
          - path: /patch-defs

    route:
      bluemap:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - mcsv2-map.eviljungle.com
        rules:
          - matches:
              - path: {type: PathPrefix, value: /}
            backendRefs:
              - name: minecraft-survival2
                port: 8100

    service:
      app:
        controller: minecraft-survival2
        ports:
          minecraft:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
          bluemap:
            port: 8100
