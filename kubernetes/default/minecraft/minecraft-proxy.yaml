---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mcproxy
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      config:
        data:
          velocity.toml: |
            # Config version. Do not change this
            config-version = "2.6"

            bind = "0.0.0.0:25577"
            motd = "<aqua>eviljungle</aqua> <gold><bold>lobby</bold></gold>"
            show-max-players = 100
            online-mode = true
            force-key-authentication = true
            prevent-client-proxy-connections = false

            # "modern" forwarding passes player IPs/UUIDs via Velocity's native protocol (MC 1.13+)
            player-info-forwarding-mode = "modern"
            forwarding-secret-file = "forwarding.secret"

            announce-forge = false
            kick-existing-players = false
            # pass the backend lobby's description through to the server list
            ping-passthrough = "description"
            enable-player-address-logging = true

            [servers]
            lobby    = "minecraft-lobby:25565"
            survival = "minecraft-survival:25565"
            survival2 = "minecraft-survival2:25565"
            creative = "minecraft-creative:25565"

            # land all connecting players on the lobby first
            try = ["lobby"]

            [forced-hosts]

            [advanced]
            compression-threshold = 256
            compression-level = -1
            login-ratelimit = 3000
            connection-timeout = 5000
            read-timeout = 30000
            haproxy-protocol = false
            tcp-fast-open = false
            bungee-plugin-message-channel = true
            show-ping-requests = false
            failover-on-unexpected-server-disconnect = true
            announce-proxy-commands = true
            log-command-executions = false
            log-player-connections = true

            [query]
            enabled = true
            port = 25577
            map = "Velocity"
            show-plugins = false

    controllers:
      mcproxy:
        containers:
          app:
            image:
              repository: itzg/bungeecord
              tag: 2025.10.0-java21@sha256:2b6088919f75b7ebda4b8f9daae5ab72c46cb6465e3074cfe243cecaf2b8b05a
            env:
              TYPE: VELOCITY
              PLUGINS: https://cdn.modrinth.com/data/NIdM82TF/versions/uyXHe09R/velocity-aliases-1.0.0.jar
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25577
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25577
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 750Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      server:
        type: emptyDir
        globalMounts:
          - path: /server
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/velocity.toml
            subPath: velocity.toml
            readOnly: true
      # forwarding.secret must be at /server/forwarding.secret (relative path in velocity.toml)
      forwarding-secret:
        type: secret
        name: mcproxy-velocity-secret
        globalMounts:
          - path: /server/forwarding.secret
            subPath: forwarding.secret
            readOnly: true

    service:
      app:
        controller: mcproxy
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: 10.0.6.106
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: mc.eviljungle.com
        ports:
          proxy:
            port: 25565
            targetPort: 25577
            protocol: TCP
