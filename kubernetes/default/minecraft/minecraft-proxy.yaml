---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mcproxy
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      config:
        data:
          config.yml: |
            player_limit: -1
            ip_forward: true
            permissions:
              default:
              - bungeecord.command.server
              - bungeecord.command.list
              - alert.trigger
              - slashserver.lobby
              - slashserver.survival
              - slashserver.survival2
              admin:
              - bungeecord.command.alert
              - bungeecord.command.end
              - bungeecord.command.ip
              - bungeecord.command.reload
              - alert.receive
              - alert.receive.firstjoin
              - alert.command.toggle
              - alert.command.reload
              family:
              - bungeecord.server.survival
            timeout: 30000
            log_pings: true
            log_commands: false
            online_mode: true
            servers:
              lobby:
                motd: '&1eviljungle lobby'
                address: minecraft-lobby:25565
                restricted: false
              creative:
                motd: 'creative server'
                address: minecraft-creative:25565
                restricted: false
              survival:
                motd: 'Survival SMP'
                address: minecraft-survival:25565
                restricted: false
              survival2:
                motd: 'Public Survival EZ-mode SMP'
                address: minecraft-survival2:25565
                restricted: false
            listeners:
            - query_port: 25577
              motd: '&3eviljungle &6&Llobby'
              priorities:
              - lobby
              bind_local_address: true
              tab_list: GLOBAL_PING
              query_enabled: true
              host: 0.0.0.0:25577
            ping_passthrough: true
            groups:
              billimek:
              - admin
              - family
              AnsleyElla:
              - family
              BrinleyHarper:
              - family

    controllers:
      mcproxy:
        containers:
          app:
            image:
              repository: itzg/bungeecord
              tag: 2025.10.0@sha256:28a4f84f538cee00099cee8370b075594b258f93c5feeaefb0fde736aa9636ab
            env:
              TYPE: WATERFALL
              SPIGET_PLUGINS: "78915"
              PLUGINS: "https://github.com/Army-py/SlashServer/releases/download/tested/SlashServer-4.0.jar"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25577
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25577
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 750Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /server/config.yml
            subPath: config.yml
            readOnly: true

    service:
      app:
        controller: mcproxy
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: 10.0.6.106
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: mc.eviljungle.com
        ports:
          proxy:
            port: 25565
            targetPort: 25577
            protocol: TCP
