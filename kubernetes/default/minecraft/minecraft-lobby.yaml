---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-lobby
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      velocity-patch:
        data:
          velocity-forwarding.json: |
            {
              "file": "/data/config/paper-global.yml",
              "ops": [
                { "$set": { "path": "$.proxies.velocity.enabled", "value": true, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity['online-mode']", "value": true, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity.secret", "value": "${CFG_VELOCITY_SECRET}" } }
              ]
            }

    controllers:
      minecraft-lobby:
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.4@sha256:f364bae78a0027aee72b01b9b532b1ae0990b3ee8cadbb6a3bc25db77418a25f
            env:
              EULA: "true"
              TYPE: PAPER
              VERSION: LATEST
              DIFFICULTY: peaceful
              MODE: adventure
              MOTD: "§feviljungle§ - §a§llobby§"
              ONLINE_MODE: "false"
              OVERRIDE_SERVER_PROPERTIES: "true"
              MEMORY: 1536M
              USE_AIKAR_FLAGS: "true"
              JVM_OPTS: "--add-modules=jdk.incubator.vector"
              MAX_TICK_TIME: "-1"
              LEVEL: "Basic Lobby"
              ICON: https://www.freeiconspng.com/uploads/minecraft-server-icon-13.png
              STOP_SERVER_ANNOUNCE_DELAY: "20"
              SPIGET_RESOURCES: "28140,6245,4441"
              PATCH_DEFINITIONS: /patch-defs
              MODRINTH_PROJECTS: |
                essentialsx
                coreprotect?
                freezehibernate?
                EWR3hxnq?
                nochatreports-spigot-paper
            envFrom:
              - secretRef:
                  name: minecraft-lobby-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 2Gi
                cpu: 250m
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      data:
        existingClaim: minecraft-lobby-datadir
        globalMounts:
          - path: /data
      velocity-patch:
        type: configMap
        identifier: velocity-patch
        globalMounts:
          - path: /patch-defs

    service:
      app:
        controller: minecraft-lobby
        ports:
          minecraft:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
