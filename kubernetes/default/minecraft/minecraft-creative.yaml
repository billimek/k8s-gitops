---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-creative
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    configMaps:
      direct-auth-patch:
        data:
          paper-direct-auth.json: |
            {
              "file": "/data/config/paper-global.yml",
              "ops": [
                { "$set": { "path": "$.proxies['bungee-cord']['online-mode']", "value": true, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity.enabled", "value": false, "value-type": "bool" } },
                { "$set": { "path": "$.proxies.velocity['online-mode']", "value": true, "value-type": "bool" } }
              ]
            }
          disable-bungee-forwarding.json: |
            {
              "file": "/data/spigot.yml",
              "ops": [
                { "$set": { "path": "$.settings.bungeecord", "value": false, "value-type": "bool" } }
              ]
            }

    controllers:
      minecraft-creative:
        type: statefulset
        statefulset:
          serviceName: minecraft-creative
        replicas: 0
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.6.0@sha256:775492ff9a85243383ac15fc2d3c311569c63cfe624e9c1c99b9a5c1c1585972
            env:
              EULA: "true"
              TYPE: PAPER
              VERSION: LATEST
              DIFFICULTY: normal
              MODE: creative
              ONLINE_MODE: "true"
              OVERRIDE_SERVER_PROPERTIES: "true"
              MEMORY: 5120M
              USE_AIKAR_FLAGS: "true"
              JVM_OPTS: "--add-modules=jdk.incubator.vector"
              MAX_WORLD_SIZE: "5999968"
              MAX_TICK_TIME: "-1"
              PAUSE_WHEN_EMPTY_SECONDS: "300"
              LEVEL: world-20160823
              ICON: https://www.freeiconspng.com/uploads/minecraft-server-icon-13.png
              MOTD: "§b§lEvilJungle Creative§r\n§7Build freely §8| §aFamily server"
              STOP_SERVER_ANNOUNCE_DELAY: "20"
              SPIGET_RESOURCES: "4441"
              PATCH_DEFINITIONS: /patch-defs
              APPLY_EXTRA_FILES: |
                plugins<https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
              MINECRAFT_PROMETHEUS_EXPORTER_HOST: 0.0.0.0
              MINECRAFT_PROMETHEUS_EXPORTER_PORT: "9940"
              MODRINTH_PROJECTS: |
                essentialsx
                coreprotect?
                freezehibernate?
                bluemap
                nochatreports-spigot-paper
            envFrom:
              - secretRef:
                  name: minecraft-creative-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 6Gi
                cpu: 250m
              limits:
                memory: 7Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      data:
        existingClaim: minecraft-creative-datadir
        globalMounts:
          - path: /data
      direct-auth-patch:
        type: configMap
        identifier: direct-auth-patch
        globalMounts:
          - path: /patch-defs

    route:
      bluemap:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - mccreative-map.eviljungle.com
        rules:
          - matches:
              - path: {type: PathPrefix, value: /}
            backendRefs:
              - name: minecraft-creative
                port: 8100

    service:
      app:
        controller: minecraft-creative
        labels:
          minecraft.eviljungle.com/server-metrics: "true"
        annotations:
          mc-router.itzg.me/externalServerName: mc.eviljungle.com
          mc-router.itzg.me/autoScaleAsleepMOTD: "§8[asleep] §bcreative§r - connecting wakes it"
          mc-router.itzg.me/autoScaleLoadingMOTD: "§e[starting] §bcreative§r - give it a minute"
          mc-router.itzg.me/autoScaleWaitTimeout: 5m
        ports:
          minecraft:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
          bluemap:
            port: 8100
          metrics:
            port: 9940
