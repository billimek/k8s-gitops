---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-creative
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    controllers:
      minecraft-creative:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.4@sha256:f364bae78a0027aee72b01b9b532b1ae0990b3ee8cadbb6a3bc25db77418a25f
            env:
              EULA: "true"
              TYPE: PAPER
              VERSION: LATEST
              DIFFICULTY: normal
              MODE: creative
              ONLINE_MODE: "false"
              OVERRIDE_SERVER_PROPERTIES: "true"
              MEMORY: 5120M
              USE_AIKAR_FLAGS: "true"
              JVM_OPTS: "--add-modules=jdk.incubator.vector"
              MAX_WORLD_SIZE: "5999968"
              MAX_TICK_TIME: "-1"
              LEVEL: world-20160823
              ICON: https://www.freeiconspng.com/uploads/minecraft-server-icon-13.png
              MOTD: "§feviljungle§ - §a§lcreative§"
              STOP_SERVER_ANNOUNCE_DELAY: "20"
              SPIGET_RESOURCES: "4441"
              MODRINTH_PROJECTS: |
                essentialsx
                coreprotect?
                freezehibernate?
                bluemap
                nochatreports-spigot-paper
            envFrom:
              - secretRef:
                  name: minecraft-creative-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  initialDelaySeconds: 30
                  periodSeconds: 5
                  failureThreshold: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: 6Gi
                cpu: 250m
              limits:
                memory: 7Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    persistence:
      data:
        existingClaim: minecraft-creative-datadir
        globalMounts:
          - path: /data

    route:
      bluemap:
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/target: "10.0.6.151"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - mccreative-map.eviljungle.com
        rules:
          - matches:
              - path: {type: PathPrefix, value: /}
            backendRefs:
              - name: minecraft-creative
                port: 8100

    service:
      app:
        controller: minecraft-creative
        ports:
          minecraft:
            port: 25565
            protocol: TCP
          bluemap:
            port: 8100
