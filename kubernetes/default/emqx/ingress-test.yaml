---
# Test Ingress for emqx dashboard using Cilium ingress controller
# This runs in parallel with the existing emqx.eviljungle.com (nginx-tailscale)
# to validate the Cilium ingress setup before migrating production traffic.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emqx-dashboard-test
  namespace: default
  annotations:
    # OpnSense internal DNS via external-dns-opnsense
    external-dns.alpha.kubernetes.io/internal: "true"
    external-dns.alpha.kubernetes.io/target: "emqx-test.eviljungle.com"
spec:
  ingressClassName: cilium-tailscale
  rules:
    - host: &host emqx-test.eviljungle.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: emqx-dashboard
                port:
                  number: 18083
  tls:
    - hosts:
        - *host
