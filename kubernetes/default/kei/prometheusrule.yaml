---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kei-rules
  namespace: default
spec:
  groups:
    - name: kei.rules
      rules:
        - alert: KeiSyncFailing
          annotations:
            description: kei download transfers are failing ({{ $value }} in the last 2h). Check iCloud credentials or network connectivity.
            summary: kei iCloud sync is failing.
          # Interim threshold: kei #507 / upstream #480 hard-fails valid media with mismatched extension
          # (JPEG bytes under .PNG), inflating kei_sync_failed_total each cycle. Revert to > 0 once fixed.
          expr: increase(kei_sync_failed_total[2h]) > 20
          for: 15m
          labels:
            severity: warning

        - alert: KeiSyncDown
          annotations:
            description: kei has {{ $value }} assets permanently stuck in the failed state. The download pipeline cannot make progress.
            summary: kei iCloud sync is critically failing.
          expr: kei_db_assets_total{status="failed"} > 0
          for: 30m
          labels:
            severity: critical

        - alert: KeiNoRecentSync
          annotations:
            description: kei has not completed a successful iCloud sync in over 2 hours (last success was {{ $value | humanizeDuration }} ago).
            summary: kei has not synced recently.
          expr: ((time() - kei_health_last_success_timestamp_seconds) > 7200) and (kei_health_last_success_timestamp_seconds > 0)
          for: 5m
          labels:
            severity: warning

        - alert: KeiEnumerationErrors
          annotations:
            description: kei has had repeated CloudKit enumeration shortfalls over the past 6 hours. This may indicate a persistent iCloud zone issue.
            summary: kei iCloud enumeration is consistently incomplete.
          expr: increase(kei_sync_enumeration_errors_total[6h]) > 3
          for: 30m
          labels:
            severity: warning

        - alert: KeiSessionExpired
          annotations:
            description: An iCloud session expiration was detected. Manual 2FA re-authentication may be required.
            summary: kei iCloud session expired.
          expr: increase(kei_sync_session_expirations_total[1h]) > 0
          for: 0m
          labels:
            severity: warning
