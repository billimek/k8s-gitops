---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kei
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 35

    configMaps:
      config:
        data:
          config.toml: |
            log_level = "info"

            [download]
            directory = "/photos"

            [filters]
            libraries = ["all"]
            albums = ["none"]

            [metadata]
            set_exif_datetime = true
            set_exif_rating = true
            set_exif_gps = true
            set_exif_description = true
            embed_xmp = true
            xmp_sidecar = false

            [watch]
            interval = 3600

            [notifications]
            script = "/scripts/notify.sh"

            [server]
            bind = "0.0.0.0"
            port = 9090
      scripts:
        data:
          notify.sh: |
            #!/bin/bash
            # KEI_EVENT: 2fa_required | sync_started | sync_complete | sync_failed | session_expired
            # KEI_MESSAGE: human-readable description
            # KEI_ICLOUD_USERNAME: iCloud account
            case "$KEI_EVENT" in
              sync_complete|sync_started) exit 0 ;;
            esac

            # Throttle: skip if same event+message was sent within 6 hours.
            # State persists on the config PVC so pod restarts don't re-spam.
            NOTIFY_DIR="${KEI_DATA_DIR:-/config}/.notify"
            mkdir -p "$NOTIFY_DIR"
            STATE_FILE="$NOTIFY_DIR/last_${KEI_EVENT}"
            NOW=$(date +%s)
            THROTTLE=21600
            if [ -f "$STATE_FILE" ]; then
              LAST_TS=$(head -1 "$STATE_FILE" 2>/dev/null || echo 0)
              LAST_MSG=$(tail -n +2 "$STATE_FILE" 2>/dev/null || echo "")
              if [ $(( NOW - LAST_TS )) -lt $THROTTLE ] && [ "$LAST_MSG" = "$KEI_MESSAGE" ]; then
                exit 0
              fi
            fi
            printf '%s\n%s' "$NOW" "$KEI_MESSAGE" > "$STATE_FILE"

            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"**kei** [\`$KEI_EVENT\`]: $KEI_MESSAGE (\`$KEI_ICLOUD_USERNAME\`)\"}"

    controllers:
      kei:
        containers:
          app:
            image:
              repository: ghcr.io/rhoopr/kei
              tag: 0.21.3@sha256:f15dc5294a9d956d6a293f894c85edd9a7965c77991826291f3aeb717f3b67a4
            args:
              - service
              - run
              - --config
              - /etc/kei/config.toml
            env:
              TZ: America/New_York
              KEI_DATA_DIR: /config
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9090
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9090
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  failureThreshold: 3
            envFrom:
              - secretRef:
                  name: kei-secret
            resources:
              requests:
                cpu: 10m
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    service:
      app:
        controller: kei
        ports:
          http:
            port: 9090

    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      photos:
        type: nfs
        server: nas.home
        path: /mnt/tank/backups/icloud_photos
        globalMounts:
          - path: /photos
      config:
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      kei-config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /etc/kei/config.toml
            subPath: config.toml
      scripts:
        type: configMap
        identifier: scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts/notify.sh
            subPath: notify.sh
