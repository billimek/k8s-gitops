---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kei
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 35

    configMaps:
      scripts:
        data:
          notify.sh: |
            #!/bin/bash
            # KEI_EVENT: 2fa_required | sync_complete | sync_failed | session_expired
            # KEI_MESSAGE: human-readable description
            # KEI_ICLOUD_USERNAME: iCloud account
            case "$KEI_EVENT" in
              sync_complete) exit 0 ;;  # don't spam on every successful sync
            esac
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"**kei** [\`$KEI_EVENT\`]: $KEI_MESSAGE (\`$KEI_ICLOUD_USERNAME\`)\"}"

    controllers:
      kei:
        containers:
          app:
            image:
              repository: ghcr.io/rhoopr/kei
              tag: 0.11.0@sha256:e9a75b3c3e9f164077bea865e414443980dae6d91b59c7262663ec6a6e5119d0
            args:
              - sync
              - --data-dir
              - /config
              - --directory
              - /photos
            env:
              TZ: America/New_York
              KEI_LIBRARY: all
              KEI_WATCH_WITH_INTERVAL: "3600"
              KEI_NOTIFICATION_SCRIPT: /scripts/notify.sh
              KEI_HTTP_PORT: "9090"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  failureThreshold: 3
            envFrom:
              - secretRef:
                  name: kei-secret
            resources:
              requests:
                cpu: 10m
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    service:
      app:
        controller: kei
        ports:
          http:
            port: 9090

    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      photos:
        type: nfs
        server: nas.home
        path: /mnt/tank/backups/icloud_photos
        globalMounts:
          - path: /photos
      config:
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      scripts:
        type: configMap
        identifier: scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts/notify.sh
            subPath: notify.sh
