---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kei
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      terminationGracePeriodSeconds: 35

    configMaps:
      config:
        data:
          config.toml: |
            log_level = "debug"

            [download]
            directory = "/photos"
            # {library} keeps PrimarySync/SharedSync in separate trees so cross-library dupes don't collide+bloat (kei #559)
            folder_structure = "{library}/%Y/%m/%d"

            [filters]
            libraries = ["all"]
            albums = ["none"]

            [photos]
            # name-id7 gives every file a deterministic per-asset id7 stem so re-syncs reconstruct the same path and match existing files; name-size-dedup re-downloads recurring shared-library assets under new suffixes each cycle (kei #546), bloating /photos and self-colliding on content-hash .kei-tmp files
            file_match_policy = "name-id7"

            [watch]
            interval = 3600

            [notifications]
            script = "/scripts/notify.sh"

            [server]
            bind = "0.0.0.0"
            port = 9090
      scripts:
        data:
          notify.sh: |
            #!/bin/bash
            # KEI_EVENT: 2fa_required | sync_started | sync_complete | sync_failed | session_expired
            # KEI_MESSAGE: human-readable description
            # KEI_ICLOUD_USERNAME: iCloud account
            case "$KEI_EVENT" in
              sync_complete|sync_started) exit 0 ;;
            esac

            # Throttle: skip if same event+message was sent within 6 hours.
            # State persists on the config PVC so pod restarts don't re-spam.
            NOTIFY_DIR="${KEI_DATA_DIR:-/config}/.notify"
            mkdir -p "$NOTIFY_DIR"
            STATE_FILE="$NOTIFY_DIR/last_${KEI_EVENT}"
            NOW=$(date +%s)
            THROTTLE=21600
            if [ -f "$STATE_FILE" ]; then
              LAST_TS=$(head -1 "$STATE_FILE" 2>/dev/null || echo 0)
              LAST_MSG=$(tail -n +2 "$STATE_FILE" 2>/dev/null || echo "")
              if [ $(( NOW - LAST_TS )) -lt $THROTTLE ] && [ "$LAST_MSG" = "$KEI_MESSAGE" ]; then
                exit 0
              fi
            fi
            printf '%s\n%s' "$NOW" "$KEI_MESSAGE" > "$STATE_FILE"

            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"**kei** [\`$KEI_EVENT\`]: $KEI_MESSAGE (\`$KEI_ICLOUD_USERNAME\`)\"}"

    controllers:
      kei:
        containers:
          app:
            image:
              repository: ghcr.io/rhoopr/kei
              tag: 0.22.11@sha256:e901ab85f516d801fc4ab502333579f74998e1ce5beade2eed5a1306ee4f9cae
            args:
              - service
              - run
              - --config
              - /etc/kei/config.toml
            env:
              TZ: America/New_York
              KEI_DATA_DIR: /config
            probes:
              # kei 0.22.9+: /healthz returns 200 before the first sync cycle (only 503 for
              # genuine staleness/failure once health is established), so httpGet is safe here
              # and the pod becomes Ready quickly on a healthy boot.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 10
                  failureThreshold: 30
              # /healthz returns 503 when last_success_at > watch_interval*2 (2h) or
              # consecutive_failures >= 5; restarts ~3min after that, auto-recovering stalls.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9090
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  failureThreshold: 3
            envFrom:
              - secretRef:
                  name: kei-secret
            resources:
              requests:
                cpu: 10m
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    service:
      app:
        controller: kei
        ports:
          http:
            port: 9090

    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      photos:
        type: nfs
        server: nas.home
        path: /mnt/tank/backups/icloud_photos
        globalMounts:
          - path: /photos
      config:
        existingClaim: kei-config
        globalMounts:
          - path: /config
      kei-config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /etc/kei/config.toml
            subPath: config.toml
      scripts:
        type: configMap
        identifier: scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts/notify.sh
            subPath: notify.sh
