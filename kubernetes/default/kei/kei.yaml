---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kei
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      kei:
        containers:
          app:
            image:
              repository: ghcr.io/rhoopr/kei
              tag: 0.7.12@sha256:b62d10c850d37529ecd0a2873091e6a6b6e26e45b397dca23da7c5027a544a45
            args:
              - sync
              - --data-dir
              - /config
              - --directory
              - /photos
            env:
              TZ: America/New_York
              KEI_LIBRARY: all
              KEI_WATCH_WITH_INTERVAL: "3600"
              KEI_NOTIFICATION_SCRIPT: /scripts/notify.sh
            envFrom:
              - secretRef:
                  name: kei-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 35
    configMaps:
      scripts:
        data:
          notify.sh: |
            #!/bin/bash
            # KEI_EVENT: 2fa_required | sync_complete | sync_failed | session_expired
            # KEI_MESSAGE: human-readable description
            # KEI_ICLOUD_USERNAME: iCloud account
            case "$KEI_EVENT" in
              sync_complete) exit 0 ;;  # don't spam on every successful sync
            esac
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"**kei** [\`$KEI_EVENT\`]: $KEI_MESSAGE (\`$KEI_ICLOUD_USERNAME\`)\"}"
    persistence:
      photos:
        type: nfs
        server: nas.home
        path: /mnt/tank/backups/icloud_photos
        globalMounts:
          - path: /photos
      config:
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      scripts:
        type: configMap
        identifier: scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts/notify.sh
            subPath: notify.sh
