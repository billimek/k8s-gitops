---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-slim
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          files: |-
            kubernetes/**/*

  flate:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Flate
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    permissions:
      contents: read
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default
          persist-credentials: false

      - name: Setup Flate
        uses: home-operations/flate/action@aef47adc856bb97038ff321e5136cf65e0fa23cf # 0.1.27
        with:
          cache: true

      - name: Run Flate
        run: |
          flate diff all \
            --path ./pull/setup/flux/cluster \
            --path-orig ./default/setup/flux/cluster \
            --allow-missing-secrets \
            --skip-kinds ValidatingWebhookConfiguration \
            --skip-kinds MutatingWebhookConfiguration > flate.diff || true
          [ -s flate.diff ] || rm -f flate.diff

      - if: ${{ hashFiles('flate.diff') != '' }}
        name: Upload diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flate-diff
          path: flate.diff
          retention-days: 1

  comment:
    if: ${{ !cancelled() && needs.flate.result != 'skipped' }}
    name: Flate comment
    runs-on: ubuntu-slim
    needs:
      - flate
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download diff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: flate-diff
          merge-multiple: true

      - if: ${{ hashFiles('flate.diff') != '' }}
        name: Add or update comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = `<!-- flate -->`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const LIMIT = 65000; // GitHub caps comment bodies at 65,536; leave headroom

            const diff = fs.readFileSync('flate.diff', 'utf8');
            const footer = `\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) - [Workflow run](${runUrl})</sub>`;

            const inline = [marker, '', '```diff', diff, '```', footer].join('\n');
            const linked = [
              marker, '',
              `Flate diff (${diff.length.toLocaleString()} chars) exceeds GitHub's comment size limit.`,
              `Download the \`flate-diff\` artifact from the [workflow run](${runUrl}).`,
              footer,
            ].join('\n');
            const body = inline.length <= LIMIT ? inline : linked;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  flate-success:
    needs:
      - flate
      - comment
    if: ${{ !cancelled() }}
    name: Flate successful
    runs-on: ubuntu-slim
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
