cluster:
  allowSchedulingOnControlPlanes: false
  apiServer:
    extraArgs:
      enable-aggregator-routing: true
      feature-gates: HPAScaleToZero=true
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  coreDNS:
    disabled: true
  # discovery:
  #   enabled: true
  #   registries:
  #     kubernetes:
  #       disabled: false
  #     service:
  #       disabled: true
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
      # Prevent database bloat with auto-compaction
      auto-compaction-mode: periodic
      auto-compaction-retention: "1h"
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
    # scheduler.config removed: v1.13.3 panics deep-copying int values in scheduler.config
    # restore after siderolabs/talos#13445 is fixed

